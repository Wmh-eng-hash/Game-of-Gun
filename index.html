<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>自动打怪 · 突破增幅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            touch-action: none;
        }
        /* 游戏容器：占满视口 */
        .game-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1e2a2e;
            position: relative;
            overflow: hidden;
        }
        /* Canvas 弹性填满剩余空间 */
        canvas {
            display: block;
            width: 100%;
            height: auto;
            flex: 1;
            background: #2d3f44;
            touch-action: none;
            cursor: none;
            image-rendering: pixelated;
        }
        /* ---- 顶部状态栏 (浮动) ---- */
        .top-bar {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            gap: 4px 8px;
            background: rgba(23, 33, 36, 0.7);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 40px;
            border: 1px solid rgba(63, 90, 96, 0.5);
            pointer-events: none;
            font-size: 12px;
            color: #c6e2e8;
            justify-content: center;
            transition: all 0.2s;
        }
        .top-bar span {
            background: rgba(14, 24, 28, 0.7);
            padding: 2px 10px;
            border-radius: 30px;
            border: 1px solid #345a63;
            white-space: nowrap;
            font-weight: 500;
            letter-spacing: 0.2px;
            backdrop-filter: blur(4px);
        }
        .top-bar .hp-label { color: #ff7b7b; }
        .top-bar .atk-label { color: #ffb07c; }
        .top-bar .def-label { color: #7cc9ff; }
        .top-bar .as-label { color: #7cffc9; }
        .top-bar .crit-label { color: #ffd966; }
        .top-bar .gold-label { color: #ffd700; }
        .top-bar .floor-label { color: #b0e0e6; }
        .top-bar .multiplier-label { color: #ff6eb4; }

        /* ---- 底部升级面板 (浮动) ---- */
        .bottom-panel {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            background: rgba(23, 33, 36, 0.7);
            backdrop-filter: blur(8px);
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid rgba(63, 90, 96, 0.5);
            pointer-events: auto;
            transition: all 0.2s;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .bottom-panel button {
            background: #273e45;
            border: none;
            color: #e7f4f7;
            font-weight: bold;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 2px 0 #0f1e22;
            transition: 0.08s linear;
            border: 1px solid #3b676f;
            white-space: nowrap;
            touch-action: manipulation;
            min-height: 32px;
        }
        .bottom-panel button:active { transform: translateY(2px); box-shadow: none; }
        .bottom-panel button:disabled {
            opacity: 0.5;
            transform: translateY(2px);
            box-shadow: none;
            cursor: not-allowed;
        }
        .bottom-panel button:hover { background: #32565f; }

        /* ---- 攻击按钮 (右下角) ---- */
        #attackBtn {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 32px;
            z-index: 20;
            touch-action: manipulation;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #attackBtn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3);
        }

        /* 摇杆提示 (避免与面板重叠) */
        .info-tip {
            display: none; /* 移动端去掉文字提示 */
        }

        /* ---------- 横屏优化 ---------- */
        @media (orientation: landscape) {
            .top-bar {
                font-size: 11px;
                padding: 4px 10px;
                gap: 3px 6px;
                top: 6px;
                left: 10px;
                right: 10px;
                border-radius: 30px;
            }
            .top-bar span {
                padding: 1px 8px;
                font-size: 11px;
            }
            .bottom-panel {
                bottom: 10px;
                padding: 6px 10px;
                gap: 4px;
            }
            .bottom-panel button {
                font-size: 11px;
                padding: 3px 10px;
                min-height: 28px;
            }
            #attackBtn {
                width: 60px;
                height: 60px;
                bottom: 70px;
                right: 15px;
                font-size: 28px;
            }
        }

        /* ---------- 竖屏或小屏优化 ---------- */
        @media (max-width: 600px) {
            .top-bar {
                font-size: 10px;
                padding: 4px 8px;
                gap: 2px 4px;
                border-radius: 20px;
            }
            .top-bar span {
                padding: 1px 6px;
                font-size: 10px;
            }
            .bottom-panel {
                padding: 4px 8px;
                gap: 3px;
                bottom: 8px;
                border-radius: 30px;
                justify-content: flex-start;
                flex-wrap: nowrap;
                overflow-x: auto;
            }
            .bottom-panel button {
                font-size: 10px;
                padding: 2px 8px;
                min-height: 26px;
            }
            #attackBtn {
                width: 56px;
                height: 56px;
                bottom: 60px;
                right: 12px;
                font-size: 24px;
            }
        }

        /* 针对刘海屏安全区域适配 */
        @supports (padding: max(0px)) {
            .top-bar { top: max(8px, env(safe-area-inset-top)); }
            .bottom-panel { bottom: max(12px, env(safe-area-inset-bottom)); }
            #attackBtn { bottom: max(80px, env(safe-area-inset-bottom) + 20px); }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- 顶部状态栏（动态更新） -->
    <div class="top-bar" id="topBar">
        <span class="hp-label">❤️ <span id="hpDisplay">500</span></span>
        <span class="atk-label">⚔️ <span id="atkDisplay">10</span></span>
        <span class="def-label">🛡️ <span id="defDisplay">0</span></span>
        <span class="as-label">🏹 <span id="asDisplay">2.0</span>s</span>
        <span class="crit-label">💥 <span id="critDisplay">0%</span></span>
        <span class="gold-label">💰 <span id="goldDisplay">0</span></span>
        <span class="floor-label">📈 <span id="floorDisplay">1</span></span>
        <span class="multiplier-label">💢 <span id="multiplierDisplay">1</span>x</span>
    </div>

    <!-- 底部升级面板 -->
    <div class="bottom-panel" id="upgradePanel">
        <button data-upgrade="hp">生命</button>
        <button data-upgrade="atk">攻击</button>
        <button data-upgrade="def">防御</button>
        <button data-upgrade="aspd">攻速</button>
        <button data-upgrade="crit">暴击</button>
    </div>

    <!-- 攻击按钮 (手动攻击) -->
    <button id="attackBtn">⚔️</button>
</div>

<script>
    (function() {
        // ---------- DOM 引用 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const hpSpan = document.getElementById('hpDisplay');
        const atkSpan = document.getElementById('atkDisplay');
        const defSpan = document.getElementById('defDisplay');
        const asSpan = document.getElementById('asDisplay');
        const critSpan = document.getElementById('critDisplay');
        const goldSpan = document.getElementById('goldDisplay');
        const floorSpan = document.getElementById('floorDisplay');
        const multiplierSpan = document.getElementById('multiplierDisplay');

        const attackBtn = document.getElementById('attackBtn');

        // ---------- 工具函数 ----------
        function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }

        // ---------- 简单的校验和 (防篡改) ----------
        function computeChecksum(data) {
            const salt = 'mihoyo_salt_2026';
            const str = 
                (data.player?.hp ?? 0) + '|' +
                (data.player?.maxHp ?? 0) + '|' +
                (data.player?.attack ?? 0) + '|' +
                (data.player?.defense ?? 0) + '|' +
                (data.player?.attackSpeed ?? 0) + '|' +
                (data.player?.critRate ?? 0) + '|' +
                (data.gold ?? 0) + '|' +
                (data.floor ?? 0) + '|' +
                (data.player?.level_hp ?? 0) + '|' +
                (data.player?.level_atk ?? 0) + '|' +
                (data.player?.level_def ?? 0) + '|' +
                (data.player?.level_aspd ?? 0) + '|' +
                (data.player?.level_crit ?? 0);
            let hash = 0x811c9dc5;
            const combined = salt + str;
            for (let i = 0; i < combined.length; i++) {
                hash ^= combined.charCodeAt(i);
                hash = Math.imul(hash, 0x01000193);
            }
            return (hash >>> 0).toString(16);
        }

        // ---------- 游戏状态 ----------
        const state = {
            player: {
                x: 400, y: 300,
                hp: 500, maxHp: 500,
                attack: 10,
                defense: 0,
                attackSpeed: 2.0,
                critRate: 0,
                goldRate: 1.0,
                damageMultiplier: 1,
                level_hp: 0,
                level_atk: 0,
                level_def: 0,
                level_aspd: 0,
                level_crit: 0,
            },
            floor: 1,
            monsters: [],
            bullets: [],
            damageNumbers: [],
            lastAttackTime: 0,
            floorStartTime: 0,
            floorDuration: 60,
            gameOver: false,
            joystick: { dx: 0, dy: 0 },
            keys: { up: false, down: false, left: false, right: false },
            saveKey: 'autoRoguelikeSave',
            gold: 0,
            baseUpgradeCost: {
                hp: 50,
                atk: 50,
                def: 50,
                aspd: 80,
                crit: 100,
            },
            lastSaveTime: 0,
        };

        // ---------- 补全默认属性 (兼容旧存档) ----------
        function ensurePlayerDefaults(p) {
            if (p.hp === undefined) p.hp = 500;
            if (p.maxHp === undefined) p.maxHp = 500;
            if (p.attack === undefined) p.attack = 10;
            if (p.defense === undefined) p.defense = 0;
            if (p.attackSpeed === undefined) p.attackSpeed = 2.0;
            if (p.critRate === undefined) p.critRate = 0;
            if (p.goldRate === undefined) p.goldRate = 1.0;
            if (p.damageMultiplier === undefined) p.damageMultiplier = 1;
            if (p.level_hp === undefined) p.level_hp = 0;
            if (p.level_atk === undefined) p.level_atk = 0;
            if (p.level_def === undefined) p.level_def = 0;
            if (p.level_aspd === undefined) p.level_aspd = 0;
            if (p.level_crit === undefined) p.level_crit = 0;
            if (p.x === undefined) p.x = 400;
            if (p.y === undefined) p.y = 300;
            p.hp = Math.min(p.hp, p.maxHp);
        }

        // ---------- 升级费用 ----------
        function getUpgradeCost(type) {
            const p = state.player;
            let level;
            switch(type) {
                case 'hp': level = p.level_hp; break;
                case 'atk': level = p.level_atk; break;
                case 'def': level = p.level_def; break;
                case 'aspd': level = p.level_aspd; break;
                case 'crit': level = p.level_crit; break;
                default: return 999999;
            }
            const base = state.baseUpgradeCost[type] || 50;
            return Math.floor(base * Math.pow(1.2, level));
        }

        // ---------- 突破增幅升级 ----------
        function applyUpgrade(type) {
            const p = state.player;
            if (state.gameOver) return;
            const cost = getUpgradeCost(type);
            if (state.gold < cost) return;
            state.gold -= cost;

            switch(type) {
                case 'hp': {
                    if (p.maxHp >= 100000) {
                        const bonus = Math.floor(p.maxHp * 8.0);
                        p.maxHp += bonus;
                        p.hp += bonus;
                    } else {
                        p.maxHp += 2000;
                        p.hp += 2000;
                    }
                    p.level_hp++;
                    break;
                }
                case 'atk': {
                    if (p.attack >= 2000) {
                        const bonus = Math.floor(p.attack * 7.0);
                        p.attack += bonus;
                    } else {
                        p.attack += 100;
                    }
                    p.level_atk++;
                    break;
                }
                case 'def': {
                    if (p.defense >= 3000) {
                        const bonus = Math.floor(p.defense * 5.0);
                        p.defense += bonus;
                    } else {
                        p.defense += 500;
                    }
                    p.level_def++;
                    break;
                }
                case 'aspd':
                    p.attackSpeed = Math.max(0.01, p.attackSpeed * 0.95);
                    p.level_aspd++;
                    break;
                case 'crit':
                    if (p.critRate < 1.0) {
                        p.critRate = Math.min(1.0, p.critRate + 0.01);
                        p.level_crit++;
                    } else {
                        state.gold += cost;
                        return;
                    }
                    break;
                default: return;
            }
            updateStatsUI();
            updateUpgradeButtons();
            saveGame();
        }

        // ---------- 怪物生成 (防御不为0) ----------
        function spawnMonstersForFloor(floor) {
            const monsters = [];
            const baseHp = 200;
            const baseAtk = 40;
            const baseDef = 10;
            const multiplier = Math.pow(1.8, floor - 1);
            const isBoss = (floor % 5 === 0);
            const count = isBoss ? 1 : (4 + Math.floor(Math.random() * 3));
            const bossMultiplier = isBoss ? 3.5 : 1.0;

            for (let i = 0; i < count; i++) {
                let hp = baseHp * multiplier * (0.9 + 0.2 * Math.random()) * bossMultiplier;
                let atk = baseAtk * multiplier * (0.9 + 0.2 * Math.random()) * bossMultiplier;
                let def = baseDef * multiplier * (0.8 + 0.4 * Math.random()) * (isBoss ? 2 : 1);
                let x, y, valid;
                let attempts = 0;
                do {
                    x = 60 + Math.random() * (canvas.width - 120);
                    y = 60 + Math.random() * (canvas.height - 120);
                    valid = true;
                    for (let m of monsters) {
                        if (Math.hypot(m.x - x, m.y - y) < 80) { valid = false; break; }
                    }
                    attempts++;
                } while (!valid && attempts < 50);
                monsters.push({
                    x, y,
                    hp: Math.floor(hp),
                    maxHp: Math.floor(hp),
                    attack: Math.floor(atk),
                    defense: Math.floor(def),
                    radius: isBoss ? 34 : 22,
                    isBoss: isBoss,
                    attackCooldown: 0,
                    speed: 25 + 10 * Math.random(),
                });
            }
            return monsters;
        }

        // ---------- 楼层重置 ----------
        function resetFloor(floor) {
            state.monsters = spawnMonstersForFloor(floor);
            state.floorStartTime = performance.now() / 1000;
            state.player.x = 400;
            state.player.y = 300;
            state.bullets = [];
            state.damageNumbers = [];
            state.player.damageMultiplier = 1 + Math.floor((floor - 1) / 10);
            updateStatsUI();
            updateUpgradeButtons();
            console.log(`[Floor] 进入第 ${floor} 层，怪物: ${state.monsters.length}`);
        }

        // ---------- 伤害数字 ----------
        function addDamageNumber(x, y, text, isCrit = false) {
            state.damageNumbers.push({ x, y, text, isCrit, life: 1.0, vy: -1.8 });
        }

        // ---------- 玩家攻击 (发射子弹) ----------
        function playerAttack() {
            const p = state.player;
            if (state.monsters.length === 0) return;
            let target = null;
            let minDist = Infinity;
            for (let m of state.monsters) {
                const d = Math.hypot(m.x - p.x, m.y - p.y);
                if (d < minDist) { minDist = d; target = m; }
            }
            if (!target) return;
            const angle = Math.atan2(target.y - p.y, target.x - p.x);
            const bulletSpeed = 5.2;
            state.bullets.push({
                x: p.x + 18 * Math.cos(angle),
                y: p.y + 18 * Math.sin(angle),
                vx: bulletSpeed * Math.cos(angle),
                vy: bulletSpeed * Math.sin(angle),
                damage: p.attack * p.damageMultiplier,
                life: 2.5,
            });
        }

        // ---------- 手动攻击 (暴露给按钮) ----------
        function manualAttack() {
            // 立即发射一颗子弹，不受攻击冷却限制
            playerAttack();
        }

        // ---------- 子弹碰撞 ----------
        function handleBulletCollisions() {
            const toRemove = [];
            for (let i = 0; i < state.bullets.length; i++) {
                const b = state.bullets[i];
                let used = false;
                for (let j = 0; j < state.monsters.length; j++) {
                    const m = state.monsters[j];
                    const dist = Math.hypot(b.x - m.x, b.y - m.y);
                    if (dist < m.radius + 8) {
                        let damage = b.damage;
                        const def = m.defense || 0;
                        let finalDamage = Math.max(1, damage - def);
                        let isCrit = false;
                        if (Math.random() < state.player.critRate) {
                            finalDamage = Math.floor(finalDamage * 2.0);
                            isCrit = true;
                        }
                        finalDamage = Math.floor(finalDamage);
                        m.hp -= finalDamage;

                        const p = state.player;
                        p.hp = Math.min(p.maxHp, p.hp + finalDamage);
                        const goldEarn = Math.floor(finalDamage * p.goldRate);
                        state.gold += goldEarn;

                        const text = (isCrit ? '暴击 ' : '') + finalDamage;
                        addDamageNumber(m.x, m.y - 10, text, isCrit);

                        if (m.hp <= 0) {
                            state.gold += 5;
                            const idx = state.monsters.indexOf(m);
                            if (idx !== -1) {
                                state.monsters.splice(idx, 1);
                            }
                        }
                        used = true;
                        break;
                    }
                }
                if (used) { toRemove.push(i); }
            }
            for (let i = toRemove.length - 1; i >= 0; i--) {
                state.bullets.splice(toRemove[i], 1);
            }
            if (state.monsters.length === 0 && !state.gameOver) {
                state.floor++;
                resetFloor(state.floor);
                floorSpan.textContent = state.floor;
                saveGame();
            }
            updateStatsUI();
            updateUpgradeButtons();
        }

        // ---------- 怪物移动 ----------
        function moveMonsters(delta) {
            const p = state.player;
            for (let m of state.monsters) {
                const dx = p.x - m.x;
                const dy = p.y - m.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 1) {
                    const speed = m.speed || 30;
                    const moveX = (dx / dist) * speed * delta;
                    const moveY = (dy / dist) * speed * delta;
                    m.x += moveX;
                    m.y += moveY;
                }
                m.x = clamp(m.x, 20, canvas.width - 20);
                m.y = clamp(m.y, 20, canvas.height - 20);
            }
        }

        // ---------- 怪物攻击玩家 ----------
        function monsterAttackPlayer(delta) {
            const p = state.player;
            for (let m of state.monsters) {
                const dist = Math.hypot(m.x - p.x, m.y - p.y);
                if (dist < m.radius + 18) {
                    m.attackCooldown = (m.attackCooldown || 0) - delta;
                    if (m.attackCooldown <= 0) {
                        let dmg = Math.max(1, m.attack - p.defense);
                        dmg = Math.floor(dmg);
                        p.hp -= dmg;
                        addDamageNumber(p.x, p.y - 40, '-' + dmg, false);
                        m.attackCooldown = 1.2 + Math.random() * 0.5;
                        if (p.hp <= 0) {
                            p.hp = 0;
                            if (state.floor > 1) {
                                state.floor--;
                            } else {
                                state.floor = 1;
                            }
                            resetFloor(state.floor);
                            p.hp = Math.floor(p.maxHp * 0.5);
                            updateStatsUI();
                            floorSpan.textContent = state.floor;
                            saveGame();
                            console.log(`[Death] 死亡，回退至第 ${state.floor} 层`);
                        }
                    }
                } else {
                    m.attackCooldown = Math.min(0, m.attackCooldown || 0);
                }
            }
        }

        // ---------- UI 更新 ----------
        function updateStatsUI() {
            const p = state.player;
            hpSpan.textContent = Math.floor(p.hp) + '/' + p.maxHp;
            atkSpan.textContent = p.attack;
            defSpan.textContent = p.defense;
            asSpan.textContent = p.attackSpeed.toFixed(2);
            critSpan.textContent = (p.critRate * 100).toFixed(0) + '%';
            goldSpan.textContent = state.gold;
            floorSpan.textContent = state.floor;
            multiplierSpan.textContent = p.damageMultiplier + 'x';
        }

        function updateUpgradeButtons() {
            const types = ['hp', 'atk', 'def', 'aspd', 'crit'];
            const btns = document.querySelectorAll('#upgradePanel button');
            btns.forEach((btn, idx) => {
                const type = types[idx];
                const cost = getUpgradeCost(type);
                const canAfford = state.gold >= cost;
                if (type === 'crit' && state.player.critRate >= 1.0) {
                    btn.disabled = true;
                    btn.textContent = '暴击MAX';
                    return;
                }
                btn.disabled = !canAfford || state.gameOver;
                const label = type === 'hp' ? '生命' :
                              type === 'atk' ? '攻击' :
                              type === 'def' ? '防御' :
                              type === 'aspd' ? '攻速' : '暴击';
                btn.textContent = label + ' ' + cost + 'G';
            });
        }

        // ---------- 存档 ----------
        function saveGame() {
            try {
                const data = {
                    player: state.player,
                    floor: state.floor,
                    monsters: state.monsters,
                    gameOver: state.gameOver,
                    gold: state.gold,
                    checksum: '',
                };
                data.checksum = computeChecksum(data);
                localStorage.setItem(state.saveKey, JSON.stringify(data));
                state.lastSaveTime = performance.now();
                console.log('[Save] 存档成功');
            } catch (e) {
                console.error('[Save] 存档失败:', e);
                if (e.name === 'QuotaExceededError') {
                    alert('存储空间不足，请清理缓存后重试。');
                }
            }
        }

        // ---------- 加载存档 ----------
        function loadGame() {
            const raw = localStorage.getItem(state.saveKey);
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                const storedChecksum = data.checksum;
                if (!storedChecksum) {
                    console.warn('[Load] 存档无校验，重置');
                    return false;
                }
                const calcChecksum = computeChecksum(data);
                if (storedChecksum !== calcChecksum) {
                    console.warn('[Load] 校验失败，存档被篡改，重置');
                    return false;
                }
                state.player = data.player;
                ensurePlayerDefaults(state.player);
                state.floor = data.floor || 1;
                state.monsters = data.monsters || [];
                state.gameOver = data.gameOver || false;
                state.gold = data.gold || 0;
                for (let m of state.monsters) {
                    if (m.attackCooldown === undefined) m.attackCooldown = 0;
                    if (m.speed === undefined) m.speed = 25 + 10 * Math.random();
                }
                state.bullets = [];
                state.damageNumbers = [];
                state.lastAttackTime = performance.now() / 1000;
                state.floorStartTime = performance.now() / 1000;
                if (!state.player.damageMultiplier) {
                    state.player.damageMultiplier = 1 + Math.floor((state.floor - 1) / 10);
                }
                if (state.monsters.length === 0) {
                    resetFloor(state.floor);
                }
                updateStatsUI();
                floorSpan.textContent = state.floor;
                console.log('[Load] 读档成功');
                return true;
            } catch (e) {
                console.error('[Load] 读档异常:', e);
                return false;
            }
        }

        // ---------- 初始化 ----------
        function initGame() {
            const hasSave = loadGame();
            if (!hasSave) {
                state.player.hp = 500;
                state.player.maxHp = 500;
                state.player.attack = 10;
                state.player.defense = 0;
                state.player.attackSpeed = 2.0;
                state.player.critRate = 0;
                state.player.goldRate = 1.0;
                state.player.damageMultiplier = 1;
                state.player.level_hp = 0;
                state.player.level_atk = 0;
                state.player.level_def = 0;
                state.player.level_aspd = 0;
                state.player.level_crit = 0;
                state.floor = 1;
                state.gold = 0;
                state.gameOver = false;
                resetFloor(1);
                saveGame();
                console.log('[Init] 新游戏');
            }
            state.lastAttackTime = performance.now() / 1000;
            state.floorStartTime = performance.now() / 1000;
            state.lastSaveTime = performance.now();
            updateUpgradeButtons();
        }

        // ---------- 摇杆/键盘 ----------
        function setupJoystick() {
            let dragging = false;
            const joystick = state.joystick;

            function handleStart(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const touch = e.touches ? e.touches[0] : e;
                const x = (touch.clientX - rect.left) * scaleX;
                const y = (touch.clientY - rect.top) * scaleY;
                // 扩大摇杆热区：左半下部分
                if (x < canvas.width * 0.4 && y > canvas.height * 0.6) {
                    dragging = true;
                    updateJoystick(x, y);
                }
            }

            function handleMove(e) {
                e.preventDefault();
                if (!dragging) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const touch = e.touches ? e.touches[0] : e;
                const x = (touch.clientX - rect.left) * scaleX;
                const y = (touch.clientY - rect.top) * scaleY;
                updateJoystick(x, y);
            }

            function handleEnd(e) {
                e.preventDefault();
                dragging = false;
                joystick.dx = 0;
                joystick.dy = 0;
            }

            function updateJoystick(x, y) {
                const cx = 80, cy = canvas.height - 120;
                let dx = x - cx, dy = y - cy;
                const len = Math.hypot(dx, dy);
                const maxR = 60;
                if (len > maxR) { dx = dx / len * maxR; dy = dy / len * maxR; }
                joystick.dx = dx / maxR;
                joystick.dy = dy / maxR;
            }

            canvas.addEventListener('mousedown', handleStart);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('mouseup', handleEnd);
            canvas.addEventListener('touchstart', handleStart, { passive: false });
            window.addEventListener('touchmove', handleMove, { passive: false });
            window.addEventListener('touchend', handleEnd, { passive: false });

            // 键盘支持
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                if (key === 'ArrowUp') state.keys.up = true;
                if (key === 'ArrowDown') state.keys.down = true;
                if (key === 'ArrowLeft') state.keys.left = true;
                if (key === 'ArrowRight') state.keys.right = true;
                e.preventDefault();
            });
            window.addEventListener('keyup', (e) => {
                const key = e.key;
                if (key === 'ArrowUp') state.keys.up = false;
                if (key === 'ArrowDown') state.keys.down = false;
                if (key === 'ArrowLeft') state.keys.left = false;
                if (key === 'ArrowRight') state.keys.right = false;
                e.preventDefault();
            });
        }

        // ---------- 更新循环 ----------
        function update(timestamp) {
            if (state.gameOver) return;
            const now = timestamp / 1000;
            const delta = Math.min(0.05, now - (state.lastUpdateTime || now));
            state.lastUpdateTime = now;

            // 移动 (键盘+摇杆)
            let dx = state.joystick.dx;
            let dy = state.joystick.dy;
            let kx = (state.keys.left ? -1 : 0) + (state.keys.right ? 1 : 0);
            let ky = (state.keys.up ? -1 : 0) + (state.keys.down ? 1 : 0);
            if (kx !== 0 || ky !== 0) {
                const len = Math.hypot(kx, ky);
                if (len > 0) { kx /= len; ky /= len; }
                dx = kx;
                dy = ky;
            }
            const speed = 220;
            const p = state.player;
            p.x += dx * speed * delta;
            p.y += dy * speed * delta;
            p.x = clamp(p.x, 20, canvas.width - 20);
            p.y = clamp(p.y, 20, canvas.height - 20);

            // 自动攻击
            if (now - state.lastAttackTime >= p.attackSpeed) {
                if (state.monsters.length > 0) { playerAttack(); }
                state.lastAttackTime = now;
            }

            moveMonsters(delta);
            monsterAttackPlayer(delta);

            // 子弹移动
            for (let b of state.bullets) {
                b.x += b.vx;
                b.y += b.vy;
                b.life -= delta;
            }
            state.bullets = state.bullets.filter(b => b.life > 0 && b.x > -20 && b.x < canvas.width+20 && b.y > -20 && b.y < canvas.height+20);
            handleBulletCollisions();

            // 伤害数字
            for (let d of state.damageNumbers) {
                d.y += d.vy;
                d.life -= delta * 1.2;
            }
            state.damageNumbers = state.damageNumbers.filter(d => d.life > 0);

            // 楼层倒计时
            const elapsed = now - state.floorStartTime;
            if (elapsed > state.floorDuration && state.monsters.length > 0) {
                state.monsters = [];
                state.floor++;
                resetFloor(state.floor);
                floorSpan.textContent = state.floor;
                saveGame();
                console.log(`[Floor] 时间到，进入第 ${state.floor} 层`);
            }

            updateStatsUI();
            updateUpgradeButtons();

            // 每5秒保存
            if (now - state.lastSaveTime > 5) {
                saveGame();
            }
        }

        // ---------- 渲染 ----------
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 网格
            ctx.strokeStyle = '#3b5a60';
            ctx.lineWidth = 0.8;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.strokeStyle = '#2f4b52';
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.strokeStyle = '#2f4b52';
                ctx.stroke();
            }

            // 怪物
            for (let m of state.monsters) {
                ctx.beginPath();
                ctx.arc(m.x, m.y, m.radius, 0, Math.PI*2);
                ctx.fillStyle = m.isBoss ? '#9f3a3a' : '#c27e5c';
                ctx.fill();
                ctx.strokeStyle = '#e0b392';
                ctx.lineWidth = 2;
                ctx.stroke();
                const hpPercent = m.hp / m.maxHp;
                ctx.fillStyle = '#222';
                ctx.fillRect(m.x-30, m.y-38, 60, 6);
                ctx.fillStyle = hpPercent > 0.5 ? '#8fcb8f' : '#e67e7e';
                ctx.fillRect(m.x-30, m.y-38, 60 * hpPercent, 6);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 11px monospace';
                ctx.fillText(m.hp + '/' + m.maxHp, m.x-24, m.y-46);
            }

            // 子弹
            for (let b of state.bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 7, 0, Math.PI*2);
                ctx.fillStyle = '#fadf9e';
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#f5c542';
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // 玩家
            const p = state.player;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 18, 0, Math.PI*2);
            ctx.fillStyle = '#7ec8e0';
            ctx.shadowBlur = 14;
            ctx.shadowColor = '#6cb0c9';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText('⛵', p.x-12, p.y+6);

            // 伤害数字
            for (let d of state.damageNumbers) {
                ctx.globalAlpha = d.life;
                ctx.font = d.isCrit ? 'bold 24px sans-serif' : 'bold 20px sans-serif';
                ctx.fillStyle = d.isCrit ? '#ffbb33' : '#ffdbb5';
                ctx.shadowBlur = 16;
                ctx.shadowColor = '#00000080';
                ctx.fillText(d.text, d.x-20, d.y);
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }

            // 摇杆绘制（视觉反馈）
            const cx = 80, cy = canvas.height - 120;
            ctx.beginPath();
            ctx.arc(cx, cy, 50, 0, Math.PI*2);
            ctx.fillStyle = '#2f4f57';
            ctx.globalAlpha = 0.4;
            ctx.fill();
            ctx.globalAlpha = 1;
            const jx = cx + state.joystick.dx * 40;
            const jy = cy + state.joystick.dy * 40;
            ctx.beginPath();
            ctx.arc(jx, jy, 22, 0, Math.PI*2);
            ctx.fillStyle = '#b5dbe6';
            ctx.globalAlpha = 0.7;
            ctx.fill();
            ctx.globalAlpha = 1;

            // 倒计时
            const elapsed = (performance.now() / 1000 - state.floorStartTime);
            const remain = Math.max(0, state.floorDuration - elapsed);
            ctx.fillStyle = '#d4edf0';
            ctx.font = 'bold 18px monospace';
            ctx.fillText('⏳' + Math.ceil(remain) + 's', canvas.width-120, 40);

            if (state.gameOver) {
                ctx.fillStyle = '#d44';
                ctx.font = 'bold 42px sans-serif';
                ctx.fillText('💀 游戏结束', canvas.width/2-140, canvas.height/2);
            }
        }

        // ---------- 主循环 ----------
        function loop(timestamp) {
            update(timestamp);
            draw();
            requestAnimationFrame(loop);
        }

        // ---------- 绑定升级按钮 ----------
        function bindUpgrades() {
            document.querySelectorAll('#upgradePanel button').forEach(btn => {
                btn.addEventListener('click', () => {
                    const type = btn.dataset.upgrade;
                    applyUpgrade(type);
                });
            });
        }

        // ---------- 绑定攻击按钮 ----------
        function bindAttackButton() {
            attackBtn.addEventListener('click', (e) => {
                e.preventDefault();
                manualAttack();
            });
            attackBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                manualAttack();
            }, { passive: false });
        }

        // ---------- 启动 ----------
        initGame();
        setupJoystick();
        bindUpgrades();
        bindAttackButton();
        canvas.addEventListener('contextmenu', e => e.preventDefault());
        state.lastUpdateTime = performance.now() / 1000;
        requestAnimationFrame(loop);
    })();
</script>
</body>
</html>
